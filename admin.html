<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCROWN - 店長後台系統</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #11998e; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0e8379; }
        .submit-btn { width: 100%; }
        
        h2 { margin-top: 40px; border-left: 4px solid #11998e; padding-left: 10px; }
        .product-list { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .product-list th, .product-list td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .product-list th { background-color: #f8f9fa; }
        
        /* 刪除按鈕特別設計 */
        .delete-btn { background-color: #e74c3c; width: auto; padding: 6px 12px; font-size: 14px; }
        .delete-btn:hover { background-color: #c0392b; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #11998e; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">⬅ 預覽 UCROWN 首頁</a>
        <h1>👑 UCROWN 店長後台</h1>
        
        <h2>📦 新增商品</h2>
        <form id="add-product-form">
            <div class="form-group">
                <label>商品名稱：</label>
                <input type="text" id="name" required placeholder="例如：日本特級低筋麵粉">
            </div>
            <div class="form-group">
                <label>商品價格 (NT$)：</label>
                <input type="number" id="price" required placeholder="例如：180">
            </div>
            <div class="form-group">
                <label>圖片網址 (選填)：</label>
                <input type="text" id="imageUrl" placeholder="https://...">
            </div>
            <button type="submit" class="submit-btn">確認上架</button>
        </form>

        <h2>📋 目前架上商品管理</h2>
        <table class="product-list">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>商品名稱</th>
                    <th>價格</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="admin-product-list">
                </tbody>
        </table>
    </div>

    <script>
        // 1. 讀取並顯示所有商品
        async function loadAdminProducts() {
            const listBody = document.getElementById('admin-product-list');
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                listBody.innerHTML = '';
                if(products.length === 0) {
                    listBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">目前沒有任何商品</td></tr>';
                    return;
                }

                products.forEach(p => {
                    listBody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.name}</td>
                            <td>NT$ ${p.price}</td>
                            <td><button class="delete-btn" onclick="deleteProduct(${p.id}, '${p.name}')">刪除</button></td>
                        </tr>
                    `;
                });
            } catch (error) {
                listBody.innerHTML = '<tr><td colspan="4" style="color:red;">載入失敗，請檢查伺服器</td></tr>';
            }
        }

        // 2. 新增商品功能
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // 防止網頁亂跳
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const imageUrl = document.getElementById('imageUrl').value;

            try {
                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, imageUrl })
                });
                
                if(response.ok) {
                    alert('商品上架成功！');
                    document.getElementById('add-product-form').reset(); // 清空輸入框
                    loadAdminProducts(); // 重新整理下方的列表！
                } else {
                    alert('上架失敗，請檢查資料。');
                }
            } catch (error) {
                alert('系統發生錯誤！');
            }
        });

        // 3. 【新增】刪除商品功能
        async function deleteProduct(id, name) {
            // 跳出再次確認的視窗，防止老闆手滑誤按
            if(!confirm(`⚠️ 確定要刪除「${name}」嗎？\n這個動作無法復原喔！`)) return;

            try {
                // 呼叫我們剛剛在 server.js 寫好的 DELETE 指令
                const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                
                if(response.ok) {
                    alert('商品已成功刪除！');
                    loadAdminProducts(); // 重新整理下方的列表，讓被刪除的商品消失
                } else {
                    alert('刪除失敗！');
                }
            } catch (error) {
                alert('系統發生錯誤！');
            }
        }

        // 網頁一打開，立刻載入最新商品清單
        loadAdminProducts();
    </script>
</body>
</html>
