<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YcBake - 後台管理系統</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; padding: 50px; margin: 0; }
        .admin-panel { background: #ecf0f1; color: #333; padding: 30px; border-radius: 12px; width: 500px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #2980b9; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
        .msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>🛠️ 商品上架管理中心</h2>
        <form id="addProductForm">
            <div class="form-group">
                <label>商品名稱</label>
                <input type="text" id="prod-name" placeholder="例如：北海道薄力粉" required>
            </div>
            <div class="form-group">
                <label>商品價格 (NT$)</label>
                <input type="number" id="prod-price" placeholder="例如：180" required>
            </div>
            <div class="form-group">
                <label>商品圖片網址 (可先留空)</label>
                <input type="text" id="prod-image" placeholder="貼上網路圖片網址">
            </div>
            <button type="submit">確認上架商品</button>
        </form>
        <p id="message" class="msg"></p>
    </div>

    <script>
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const imageUrl = document.getElementById('prod-image').value || 'https://via.placeholder.com/220x250?text=無圖片';
            const msgEl = document.getElementById('message');

            msgEl.textContent = '上架中...';
            msgEl.style.color = '#333';

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, imageUrl })
                });
                
                if (res.ok) {
                    msgEl.style.color = 'green';
                    msgEl.textContent = '✅ 商品成功上架！';
                    document.getElementById('addProductForm').reset(); // 清空表單
                } else {
                    msgEl.style.color = 'red';
                    msgEl.textContent = '❌ 上架失敗，請檢查資料。';
                }
            } catch (error) {
                msgEl.style.color = 'red';
                msgEl.textContent = '❌ 連線錯誤。';
            }
        });
    </script>
</body>
</html>
