<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCROWN - 烘焙原料專賣</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background-color: #f9f9f9; color: #333; }
        .sidebar { width: 250px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .search-box { padding: 20px; border-bottom: 1px solid #e0e0e0; }
        .search-box input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; display: flex; flex-direction: column; }
        .menu li { border-bottom: 1px solid #f0f0f0; }
        .menu a { display: block; padding: 15px 20px; text-decoration: none; color: #555; font-size: 15px; font-weight: bold; transition: 0.3s; }
        .menu a:hover { background-color: #f4f4f4; color: #11998e; }
        .login-btn { color: #888 !important; font-weight: normal !important; }
        
        .cart-link { background-color: #fef9e7; color: #d35400 !important; }
        .cart-link:hover { background-color: #fdebd0 !important; }
        .cart-badge { background-color: #e74c3c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 5px; }

        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header-logo { text-align: center; margin-bottom: 20px; font-size: 28px; font-weight: bold; color: #444; }
        
        /* --- 【修改】輪播看板的樣式 --- */
        .banner-container { 
            width: 100%; 
            height: 250px; /* 固定高度 */
            margin-bottom: 30px; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background-color: #ffeaa7; 
            position: relative; /* 讓裡面的圖片可以疊在一起 */
        }
        .banner-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; /* 預設全部隱藏 */
            transition: opacity 1s ease-in-out; /* 1秒的淡入淡出動畫 */
        }
        .banner-img.active {
            opacity: 1; /* 只有加了 active 的圖片才會顯示 */
        }

        .product-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .product-card { background: white; padding: 15px; border: 1px solid #eee; width: 220px; text-align: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; background-color: #f0f0f0; }
        .product-title { margin: 10px 0; font-size: 18px; color: #333; }
        .product-price { color: #e74c3c; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .add-to-cart-btn { background-color: #11998e; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: auto; transition: background 0.3s; }
        .add-to-cart-btn:hover { background-color: #0e8379; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="search-box"><input type="text" placeholder="搜索產品 🔍"></div>
        <ul class="menu">
            <li><a href="/" style="color: #4CAF50;">🏠 首頁</a></li>
            <li><a href="#">📦 商品</a></li>
            <li><a href="#">ℹ️ 關於我們</a></li>
            <li><a href="/cart" class="cart-link">🛒 購物車 <span id="cart-count" class="cart-badge">0</span></a></li>
            <li style="margin-top: auto;"><a href="/login" class="login-btn">👤 登錄/註冊</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-logo">UCROWN 烘焙商城</div>
        
        <div class="banner-container">
            <img src="https://picsum.photos/id/1080/1200/250" alt="歡慶開幕" class="banner-img active">
            <img src="https://picsum.photos/id/1025/1200/250" alt="新品上市" class="banner-img">
            <img src="https://picsum.photos/id/1060/1200/250" alt="會員優惠" class="banner-img">
        </div>

        <h2 style="border-left: 4px solid #11998e; padding-left: 10px; color: #333;">🔥 最新上架</h2>
        <div class="product-grid" id="product-list">
            <p style="color: #888;">正在載入商品中...</p>
        </div>
    </div>

    <script>
        // --- 【新增】輪播圖自動切換的魔法 ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-img');
        
        // 設定每 3 秒 (3000毫秒) 執行一次切換
        setInterval(() => {
            // 先把目前的圖片隱藏
            slides[currentSlide].classList.remove('active');
            // 計算下一張圖片的號碼 (如果到最後一張，就回到第一張)
            currentSlide = (currentSlide + 1) % slides.length;
            // 把下一張圖片顯示出來
            slides[currentSlide].classList.add('active');
        }, 3000); 
        // ------------------------------------

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateCartCount() {
            const countSpan = document.getElementById('cart-count');
            const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);
            countSpan.textContent = totalQuantity;
        }

        function addToCart(id, name, price) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id: id, name: name, price: price, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(`已將 ${name} 加入購物車！`);
        }

        async function loadProducts() {
            const productList = document.getElementById('product-list');
            try {
                const response = await fetch('/api/products');
                const products = await response.json();

                productList.innerHTML = ''; 
                if (products.length === 0) {
                    productList.innerHTML = '<p style="color: #888;">目前還沒有商品上架喔，請老闆去後台新增！</p>';
                    return;
                }

                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    const imgUrl = product.image_url || 'https://via.placeholder.com/220x200?text=商品圖片';
                    
                    card.innerHTML = `
                        <img src="${imgUrl}" alt="${product.name}" class="product-image">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-price">NT$ ${product.price}</p>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">加入購物車</button>
                    `;
                    productList.appendChild(card);
                });
            } catch (error) {
                productList.innerHTML = '<p style="color: red;">連線失敗，無法讀取商品。</p>';
            }
        }

        loadProducts();
        updateCartCount();
    </script>
</body>
</html>
