<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YcBake - 烘焙原料專賣</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background-color: #f9f9f9; color: #333; }
        .sidebar { width: 250px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .search-box { padding: 20px; border-bottom: 1px solid #e0e0e0; }
        .search-box input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .menu li { border-bottom: 1px solid #f0f0f0; }
        .menu a { display: block; padding: 15px 20px; text-decoration: none; color: #555; font-size: 15px; font-weight: bold; transition: 0.3s; }
        .menu a:hover { background-color: #f4f4f4; color: #11998e; }
        .login-btn { color: #888 !important; font-weight: normal !important; }
        
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header-logo { text-align: center; margin-bottom: 30px; font-size: 28px; font-weight: bold; color: #444; }
        .product-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        
        /* 每一張商品卡片的樣式 */
        .product-card { background: white; padding: 15px; border: 1px solid #eee; width: 220px; text-align: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; background-color: #f0f0f0; }
        .product-title { margin: 10px 0; font-size: 18px; color: #333; }
        .product-price { color: #e74c3c; font-weight: bold; font-size: 16px; margin: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="search-box"><input type="text" placeholder="搜索產品 🔍"></div>
        <ul class="menu">
            <li><a href="/" style="color: #4CAF50;">首頁</a></li>
            <li><a href="#">商品</a></li>
            <li><a href="#">關於我們</a></li>
            <li><a href="/login" class="login-btn">👤 登錄/註冊</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-logo">YcBake</div>
        
        <div class="product-grid" id="product-list">
            <p style="color: #888;">正在載入商品中...</p>
        </div>
    </div>

    <script>
        async function loadProducts() {
            const productList = document.getElementById('product-list');
            try {
                // 1. 去向伺服器要商品名單
                const response = await fetch('/api/products');
                const products = await response.json();

                productList.innerHTML = ''; // 清空「載入中」的文字

                if (products.length === 0) {
                    productList.innerHTML = '<p style="color: #888;">目前還沒有商品上架喔，請老闆去後台新增！</p>';
                    return;
                }

                // 2. 把每一個商品做成漂亮的卡片
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    const imgUrl = product.image_url || 'https://via.placeholder.com/220x200?text=商品圖片';
                    
                    card.innerHTML = `
                        <img src="${imgUrl}" alt="${product.name}" class="product-image">
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-price">NT$ ${product.price}</p>
                    `;
                    productList.appendChild(card);
                });
            } catch (error) {
                productList.innerHTML = '<p style="color: red;">連線失敗，無法讀取商品。</p>';
            }
        }
        loadProducts(); // 啟動抓取程式！
    </script>
</body>
</html>
